<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Piatră, Foarfece, Hârtie</title>
    <link rel="stylesheet" href="piatra-foarfece-hartie.css">
</head>
<body>

    <div class="container-joc">
        <h1>Piatră, Foarfece, Hârtie</h1>
        <p>Alege o armă pentru a juca împotriva calculatorului!</p>

        <div class="optiuni">
            <button id="btn-piatra" class="btn-arma">🪨 Piatră</button>
            <button id="btn-hartie" class="btn-arma">📄 Hârtie</button>
            <button id="btn-foarfece" class="btn-arma">✂️ Foarfece</button>
        </div>

        <div class="panou-rezultat">
            <h2 id="mesaj-rezultat">Alege o opțiune pentru a începe!</h2>
            <p id="alegeri-afisate">Tu: - | Calculator: -</p>
        </div>

        <div class="scor">
            <div class="scor-box">
                <p>Tu</p>
                <span id="scor-jucator">0</span>
            </div>
            <div class="scor-box">
                <p>Calculator</p>
                <span id="scor-calculator">0</span>
            </div>
        </div>

        <br>
        <a href="../site.html" class="link-inapoi">← Înapoi la meniu</a>
    </div>

    <script src="piatra-foarfece-hartie.js"></script>

</body>
</html>
