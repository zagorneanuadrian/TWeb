<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Bătălia Zarurilor</title>
    <link rel="stylesheet" href="zaruri.css">
</head>
<body>

    <div class="container-joc">
        <h1>Bătălia Zarurilor</h1>
        <h2 id="mesaj-rezultat">Să înceapă bătălia!</h2>

        <div class="zona-zaruri">
            <div class="zar-box">
                <p>Tu</p>
                <div id="zar-jucator" class="zar">&#x2680;</div> 
                <p class="scor-text">Scor: <span id="scor-jucator">0</span></p>
            </div>

            <div class="zar-box">
                <p>Calculator</p>
                <div id="zar-calculator" class="zar">&#x2680;</div>
                <p class="scor-text">Scor: <span id="scor-calculator">0</span></p>
            </div>
        </div>

        <button id="btn-arunca">Dă cu zarul! 🎲</button>
        <br><br>
        <a href="../site.html" class="link-inapoi">← Înapoi la meniu</a>
    </div>

    <script src="zaruri.js"></script>

</body>
</html>
